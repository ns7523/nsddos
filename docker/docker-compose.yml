services:
  labhost:
    build:
      context: .
      dockerfile: labhost.Dockerfile
    container_name: nsddos-labhost
    privileged: true
    restart: unless-stopped
    networks:
      - nsddos-lab
    healthcheck:
      test: ["CMD-SHELL", "ovs-vsctl show >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  floodlight:
    image: eclipse-temurin:8-jre
    container_name: nsddos-floodlight
    working_dir: /opt/floodlight
    command:
      [
        "java",
        "-Dlogback.configurationFile=/opt/floodlight/logback.xml",
        "-jar",
        "/opt/floodlight/target/floodlight.jar"
      ]
    ports:
      - "8080:8080"
      - "6653:6653"
    environment:
      NSDDOS_SERVICE: floodlight
      FLOODLIGHT_HOME: /var/lib/nsddos/floodlight
    restart: unless-stopped
    networks:
      - nsddos-lab
    volumes:
      - ../external/floodlight:/opt/floodlight:ro
      - ${NSDDOS_HOME:-../.nsddos-home}/runtime/floodlight:/var/lib/nsddos/floodlight
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q '[f]loodlight.jar'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  sflowrt:
    image: eclipse-temurin:8-jre
    container_name: nsddos-sflowrt
    working_dir: /opt/ns-ddos
    command: ["sh", "/opt/ns-ddos/start.sh"]
    ports:
      - "8008:8008"
      - "6343:6343/udp"
    environment:
      NSDDOS_SERVICE: sflowrt
      SFLOWRT_HOME: /var/lib/nsddos/sflowrt
    restart: unless-stopped
    networks:
      - nsddos-lab
    volumes:
      - ../external/sflowrt:/opt/ns-ddos:ro
      - ${NSDDOS_HOME:-../.nsddos-home}/runtime/sflowrt:/var/lib/nsddos/sflowrt
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q '[s]flowrt.jar'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  detector:
    image: python:3.11-slim
    container_name: nsddos-detector
    command: ["python", "-m", "http.server", "9000", "--bind", "0.0.0.0", "--directory", "/var/lib/nsddos/detector"]
    ports:
      - "9000:9000"
    environment:
      NSDDOS_SERVICE: detector
      DETECTOR_HOME: /var/lib/nsddos/detector
    restart: unless-stopped
    networks:
      - nsddos-lab
    volumes:
      - ${NSDDOS_HOME:-../.nsddos-home}/runtime/detector:/var/lib/nsddos/detector
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q 'http.server 9000'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

networks:
  nsddos-lab:
    driver: bridge
