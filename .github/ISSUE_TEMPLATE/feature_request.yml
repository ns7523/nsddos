name: Feature Request
description: Request product, docs, CLI, or UI improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Suggested command, UI, docs, or workflow change
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Demo, research lab, deployment, portfolio, or developer workflow
