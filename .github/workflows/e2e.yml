name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  import-graph:
    name: Import graph py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate import graph and asset override
        run: |
          python -m pytest \
            tests/test_import_graph.py \
            tests/test_bootstrap_assets.py

  e2e-compose-v2:
    name: E2E compose v2 py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      NSDDOS_E2E: "1"
      NSDDOS_HOME: ${{ runner.temp }}/nsddos-home-v2-py${{ matrix.python-version }}
      ASSET_PORT: "4173"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Resolve package version
        id: meta
        run: |
          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import pathlib
          import tomllib
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          print(f"version={version}")
          PY

      - name: Build package and runtime assets
        run: |
          python -m build
          python scripts/build_runtime_release.py \
            --repo-root . \
            --output-dir dist/runtime-release \
            --github-repo "${GITHUB_REPOSITORY}" \
            --tag "v${{ steps.meta.outputs.version }}" \
            --version "${{ steps.meta.outputs.version }}"

      - name: Start local runtime asset server
        run: |
          python -m http.server "${ASSET_PORT}" --bind 127.0.0.1 --directory dist/runtime-release > "${RUNNER_TEMP}/runtime-assets-v2.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/runtime-assets-v2.pid"

      - name: Create clean install venv
        run: |
          python -m venv .venv-e2e
          . .venv-e2e/bin/activate
          python -m pip install --upgrade pip
          pip install pytest dist/*.whl

      - name: Run clean-install E2E flow
        env:
          NSDDOS_RUNTIME_ASSET_BASE_URL: http://127.0.0.1:${{ env.ASSET_PORT }}
        run: |
          . .venv-e2e/bin/activate
          nsddos bootstrap download
          pytest -vv tests/e2e/test_runtime_commands.py

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-compose-v2-py${{ matrix.python-version }}
          path: |
            dist/
            ${{ runner.temp }}/runtime-assets-v2.log
            ${{ runner.temp }}/nsddos-home-v2-py${{ matrix.python-version }}

      - name: Stop local runtime asset server
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/runtime-assets-v2.pid" ]]; then
            kill "$(cat "${RUNNER_TEMP}/runtime-assets-v2.pid")" || true
          fi

  e2e-compose-v1:
    name: E2E compose v1 py${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      NSDDOS_E2E: "1"
      NSDDOS_HOME: ${{ runner.temp }}/nsddos-home-v1-py${{ matrix.python-version }}
      ASSET_PORT: "4174"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install docker-compose v1
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Resolve package version
        id: meta
        run: |
          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import pathlib
          import tomllib
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          print(f"version={version}")
          PY

      - name: Force compose v1 resolution
        run: |
          mkdir -p "${RUNNER_TEMP}/compose-v1-bin"
          real_docker="$(command -v docker)"
          cat > "${RUNNER_TEMP}/compose-v1-bin/docker" <<EOF
          #!/usr/bin/env bash
          if [[ "\$1" == "compose" && "\$2" == "version" ]]; then
            exit 1
          fi
          exec "${real_docker}" "\$@"
          EOF
          chmod +x "${RUNNER_TEMP}/compose-v1-bin/docker"
          ln -sf "$(command -v docker-compose)" "${RUNNER_TEMP}/compose-v1-bin/docker-compose"
          echo "${RUNNER_TEMP}/compose-v1-bin" >> "${GITHUB_PATH}"

      - name: Build package and runtime assets
        run: |
          python -m build
          python scripts/build_runtime_release.py \
            --repo-root . \
            --output-dir dist/runtime-release \
            --github-repo "${GITHUB_REPOSITORY}" \
            --tag "v${{ steps.meta.outputs.version }}" \
            --version "${{ steps.meta.outputs.version }}"

      - name: Start local runtime asset server
        run: |
          python -m http.server "${ASSET_PORT}" --bind 127.0.0.1 --directory dist/runtime-release > "${RUNNER_TEMP}/runtime-assets-v1.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/runtime-assets-v1.pid"

      - name: Create clean install venv
        run: |
          python -m venv .venv-e2e
          . .venv-e2e/bin/activate
          python -m pip install --upgrade pip
          pip install pytest dist/*.whl

      - name: Run clean-install E2E flow
        env:
          NSDDOS_RUNTIME_ASSET_BASE_URL: http://127.0.0.1:${{ env.ASSET_PORT }}
        run: |
          export PATH="${RUNNER_TEMP}/compose-v1-bin:${PATH}"
          . .venv-e2e/bin/activate
          nsddos bootstrap download
          pytest -vv tests/e2e/test_runtime_commands.py

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-compose-v1-py${{ matrix.python-version }}
          path: |
            dist/
            ${{ runner.temp }}/runtime-assets-v1.log
            ${{ runner.temp }}/nsddos-home-v1-py${{ matrix.python-version }}

      - name: Stop local runtime asset server
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/runtime-assets-v1.pid" ]]; then
            kill "$(cat "${RUNNER_TEMP}/runtime-assets-v1.pid")" || true
          fi
