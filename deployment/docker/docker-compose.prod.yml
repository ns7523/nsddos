services:
  nsddos-api:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.prod
    command: python -m nsddos api start --host 0.0.0.0 --port 8008
    environment:
      NSDDOS_HOME: /var/lib/nsddos
      NSDDOS_CONFIG: /etc/nsddos/config.yaml
      NSDDOS_API_TOKEN: ${NSDDOS_API_TOKEN:-}
    ports:
      - "8008:8008"
  nsddos-ui:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.prod
    command: python -m nsddos ui start
    environment:
      NSDDOS_HOME: /var/lib/nsddos
      NSDDOS_CONFIG: /etc/nsddos/config.yaml
    ports:
      - "3000:3000"
  nsddos-runtime:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.prod
    command: python -m nsddos verify
    environment:
      NSDDOS_HOME: /var/lib/nsddos
      NSDDOS_CONFIG: /etc/nsddos/config.yaml
      NSDDOS_RUNTIME_MODE: dry-run
